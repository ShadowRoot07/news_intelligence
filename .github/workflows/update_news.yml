name: Update News Feed and AI Analysis

on:
  push:
    branches:
      - main              # Se ejecuta cada vez que subas código a main
  schedule:
    - cron: '0 */6 * * *' # Mantenemos esto para que se actualice solo cada 6 horas
  workflow_dispatch:      # Mantenemos el botón manual por si acaso

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper and Groq Analysis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "False"
        run: |
          # Usamos python manage.py migrate antes para asegurar que las tablas existan en Neon
          python manage.py migrate
          python manage.py shell -c "from news_aggregator.utils import run_all; run_all()"

