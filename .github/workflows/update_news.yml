name: Daily News Analysis

on:
  schedule:
    - cron: '0 0 * * *' # Se ejecuta exactamente a las 00:00 UTC (1 vez al día)
  workflow_dispatch:      # Permite que tú lo actives manualmente cuando quieras

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper and AI Analysis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "False"
        run: |
          python manage.py migrate
          python manage.py shell -c "from news_aggregator.utils import run_all; run_all()"

