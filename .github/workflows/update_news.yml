name: Daily News Analysis

on:
  push:
    branches:
      - main              # <--- ESTO ES LO QUE FALTA PARA QUE ACTÚE AL HACER PUSH
  schedule:
    - cron: '0 0 * * *'   # 1 vez al día a medianoche
  workflow_dispatch:      # Botón manual

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper and AI Analysis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "False"
        run: |
          # Forzamos makemigrations por si olvidaste subirlas, 
          # aunque lo ideal es que ya vayan en el push.
          python manage.py makemigrations news_aggregator
          python manage.py migrate
          python manage.py shell -c "from news_aggregator.utils import run_all; run_all()"

