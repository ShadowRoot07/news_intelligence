name: Daily News Analysis

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'   # Se ejecuta a las 00:00 UTC cada día
  workflow_dispatch:      # Permite ejecución manual desde la web de GitHub

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper and AI Analysis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "False"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Sincronizamos la base de datos en Neon
          python manage.py migrate --noinput
          
          # Ejecutamos el comando personalizado de la Opción A
          python manage.py fetch_news

