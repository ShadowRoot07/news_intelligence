<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Shadow News AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen pb-10">

    <nav class="sticky top-0 z-50 glass border-b border-gray-800 p-4">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-blue-500">
                Shadow News AI
            </h1>
            <span class="text-[10px] bg-green-900 text-green-300 px-2 py-1 rounded-full uppercase tracking-widest">
                Live Analysis
            </span>
        </div>

        <div class="flex space-x-2 mt-4 overflow-x-auto pb-2 no-scrollbar">
            <a href="/" class="px-4 py-1.5 rounded-full bg-gray-800 text-sm whitespace-nowrap border border-gray-700 hover:bg-gray-700">Todos</a>
            <a href="/category/CYB/" class="px-4 py-1.5 rounded-full bg-emerald-900/40 text-emerald-400 text-sm whitespace-nowrap border border-emerald-800 hover:bg-emerald-800/50">Ciberseguridad</a>
            <a href="/category/TEC/" class="px-4 py-1.5 rounded-full bg-blue-900/30 text-blue-400 text-sm whitespace-nowrap border border-blue-800">Tecnología</a>
            <a href="/category/CRP/" class="px-4 py-1.5 rounded-full bg-yellow-900/30 text-yellow-400 text-sm whitespace-nowrap border border-yellow-800">Cripto</a>
            <a href="/category/POL/" class="px-4 py-1.5 rounded-full bg-red-900/30 text-red-400 text-sm whitespace-nowrap border border-red-800">Política</a>
            <a href="/category/MED/" class="px-4 py-1.5 rounded-full bg-purple-900/30 text-purple-400 text-sm whitespace-nowrap border border-purple-800">Medicina</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6 mt-4">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
